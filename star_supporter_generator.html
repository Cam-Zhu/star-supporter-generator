<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Supporter Certificate Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c0392b;
    --dark: #1a1a1a;
    --mid: #555;
    --light: #f7f4f0;
    --line: #e0dbd4;
    --white: #ffffff;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 40px; }

  .star-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; }
  .star { font-size: 22px; animation: pulse 2.2s ease-in-out infinite; }
  .star.red { color: var(--red); }
  .star:nth-child(2) { animation-delay: 0.25s; }
  .star:nth-child(3) { animation-delay: 0.5s; }
  .star:nth-child(4) { animation-delay: 0.75s; }
  .star:nth-child(5) { animation-delay: 1s; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

  h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; line-height: 1.2; }
  h1 span { color: var(--red); }
  .subtitle { margin-top: 8px; color: var(--mid); font-size: 0.92rem; font-weight: 300; }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 26px 30px;
    max-width: 700px;
    margin: 0 auto 22px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.04);
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }

  .field-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .field-row label { font-size: 0.9rem; font-weight: 500; white-space: nowrap; }

  input[type="date"], input[type="text"], input[type="number"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.18s;
    background: var(--white);
    color: var(--dark);
  }
  input:focus { border-color: var(--red); }
  input[type="date"] { width: 175px; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--line);
  }
  thead th.col-remove { width: 40px; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 7px 8px 7px 0; vertical-align: middle; }
  tbody td:first-child { padding-left: 0; }
  tbody td input[type="text"] { width: 100%; }

  .amount-wrap { display: flex; align-items: center; gap: 6px; }
  .pound { font-weight: 600; color: var(--mid); }
  input[type="number"] { width: 110px; }

  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 1.3rem; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: var(--red); }

  .add-btn {
    margin-top: 14px;
    background: none;
    border: 1.5px dashed var(--line);
    border-radius: 6px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.18s;
    width: 100%;
  }
  .add-btn:hover { border-color: var(--red); color: var(--red); background: #fff8f8; }

  .generate-btn {
    display: block;
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.18s;
    box-shadow: 0 4px 16px rgba(192,57,43,0.28);
  }
  .generate-btn:hover:not(:disabled) {
    background: #a93226;
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(192,57,43,0.38);
  }
  .generate-btn:disabled { background: #bbb; box-shadow: none; cursor: not-allowed; transform: none; }

  .status {
    max-width: 700px; margin: 16px auto 0;
    text-align: center; font-size: 0.9rem; min-height: 22px; color: var(--mid);
  }
  .status.error { color: var(--red); font-weight: 500; }
  .status.success { color: #27ae60; font-weight: 600; }

  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.65s linear infinite;
    vertical-align: middle; margin-right: 7px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .badge {
    display: inline-block; background: var(--red); color: white;
    font-size: 0.68rem; font-weight: 700; border-radius: 20px;
    padding: 1px 8px; margin-left: 8px; vertical-align: middle;
  }

  .hint {
    font-size: 0.8rem; color: var(--mid); margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="star-row">
    <span class="star">★</span>
    <span class="star red">★</span>
    <span class="star">★</span>
    <span class="star red">★</span>
    <span class="star">★</span>
  </div>
  <h1>Star Supporter<br><span>Certificate Generator</span></h1>
  <p class="subtitle">Stop Hate UK — batch certificate tool</p>
</header>

<div class="card">
  <div class="section-label">Certificate Date</div>
  <div class="field-row">
    <label for="cert-date">Date to print on all certificates:</label>
    <input type="date" id="cert-date">
  </div>
</div>

<div class="card">
  <div class="section-label">Recipients <span class="badge" id="count">1</span></div>
  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Amount (£)</th>
        <th class="col-remove"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <button class="add-btn" onclick="addRow()">+ Add recipient</button>
  <p class="hint">Tip: press Tab to move between fields quickly.</p>
</div>

<button class="generate-btn" id="gen-btn" onclick="generate()">

</button>
<div class="status" id="status"></div>

// ── PDF coordinates (pdf-lib uses bottom-left origin, same as reportlab) ─────
const W = 595.5, H = 842.25;
const POSITIONS = {
  name:   { x: W/2, y: 515, size: 18, font: 'Helvetica' },
  amount: { x: W/2, y: 393, size: 16, font: 'Helvetica' },
  date:   { x: 420, y: 193, size: 13, font: 'Helvetica' },
  sig:    { x: 110, y: 195, w: 140,  h: 28 }
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function b64ToUint8(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function formatDate(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  return `${d}.${m}.${y}`;
}

// ── Row management ─────────────────────────────────────────────────────────────
let rowId = 0;

function addRow(name='', amount='') {
  const id = ++rowId;
  const tr = document.createElement('tr');
  tr.id = 'r' + id;
  tr.innerHTML = `
    <td><input type="text" placeholder="e.g. Jane Smith" value="${name}" /></td>
    <td><div class="amount-wrap"><span class="pound">£</span>
      <input type="number" min="0" step="0.01" placeholder="100" value="${amount}" />
    </div></td>
    <td><button class="remove-btn" onclick="removeRow(${id})" title="Remove row">×</button></td>`;
  document.getElementById('tbody').appendChild(tr);
  updateCount();
  if (!name) tr.querySelector('input[type="text"]').focus();
}

function removeRow(id) {
  const rows = document.querySelectorAll('#tbody tr');
  if (rows.length > 1) { document.getElementById('r'+id)?.remove(); updateCount(); }
}

function updateCount() {
  document.getElementById('count').textContent =
    document.querySelectorAll('#tbody tr').length;
}

function getRecipients() {
  return [...document.querySelectorAll('#tbody tr')].map(tr => ({
    name:   tr.querySelector('input[type="text"]').value.trim(),
    amount: tr.querySelector('input[type="number"]').value.trim()
  }));
}

// ── Certificate generation ────────────────────────────────────────────────────
async function makeCertificate(name, amount, date, templateBytes, sigBytes) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  const pdfDoc = await PDFDocument.load(templateBytes);
  const page   = pdfDoc.getPages()[0];
  const font   = await pdfDoc.embedFont(StandardFonts.Helvetica);

  // Draw name (centred)
  const p = POSITIONS;
  const nameW = font.widthOfTextAtSize(name, p.name.size);
  page.drawText(name, { x: p.name.x - nameW/2, y: p.name.y, size: p.name.size, font, color: rgb(0,0,0) });

  // Draw amount (centred)
  const amtText = `for kindly donating \u00a3${amount}`;
  const amtW = font.widthOfTextAtSize(amtText, p.amount.size);
  page.drawText(amtText, { x: p.amount.x - amtW/2, y: p.amount.y, size: p.amount.size, font, color: rgb(0,0,0) });

  // Draw date (centred on its x)
  const dateW = font.widthOfTextAtSize(date, p.date.size);
  page.drawText(date, { x: p.date.x - dateW/2, y: p.date.y, size: p.date.size, font, color: rgb(0,0,0) });

  // Draw signature image
  const sigImage = await pdfDoc.embedPng(sigBytes);
  page.drawImage(sigImage, { x: p.sig.x, y: p.sig.y, width: p.sig.w, height: p.sig.h });

  return await pdfDoc.save();
}

async function generate() {
  const dateVal    = document.getElementById('cert-date').value;
  const recipients = getRecipients();
  const btn        = document.getElementById('gen-btn');
  const status     = document.getElementById('status');

  // Validate
  if (!dateVal) { showStatus('Please select a date.', 'error'); return; }
  const valid = recipients.filter(r => r.name && r.amount);
  if (!valid.length) { showStatus('Please add at least one recipient with a name and amount.', 'error'); return; }
  const partial = recipients.filter(r => (r.name && !r.amount) || (!r.name && r.amount));
  if (partial.length) { showStatus('Some rows are missing a name or amount — please complete or remove them.', 'error'); return; }

  const date = formatDate(dateVal);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  showStatus('');

  try {
    const templateBytes = b64ToUint8(TEMPLATE_B64);
    const sigBytes      = b64ToUint8(SIG_B64);

    const zip = new JSZip();
    for (const r of valid) {
      const pdf = await makeCertificate(r.name, r.amount, date, templateBytes, sigBytes);
      const filename = r.name.replace(/\s+/g, '_') + '_certificate.pdf';
      zip.file(filename, pdf);
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(zipBlob);
    const link = document.createElement('a');
    const dateSlug = dateVal.replace(/-/g, '-');
    link.href     = url;
    link.download = `star_supporter_certificates_${dateSlug}.zip`;
    link.click();
    URL.revokeObjectURL(url);

    showStatus(`✓ ${valid.length} certificate${valid.length > 1 ? 's' : ''} downloaded!`, 'success');
  } catch(e) {
    showStatus('Something went wrong: ' + e.message, 'error');
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = 'Generate &amp; Download Certificates';
}

function showStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Init ──────────────────────────────────────────────────────────────────────
const today = new Date();
document.getElementById('cert-date').value =
  today.toISOString().slice(0,10);
addRow();
</script>
